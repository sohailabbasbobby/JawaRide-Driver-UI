<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This prevents a crash when a polyfill or extension tries to overwrite fetch
      const originalFetch = window.fetch;
      try {
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: function() { return originalFetch; },
          set: function(val) { console.warn('Caught attempt to overwrite window.fetch', val); }
        });
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
